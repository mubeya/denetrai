[build]
  publish = "."
  functions = "netlify/functions"

# Netlify function bundle'ına rules-context.json'u da dahil et (RAG için)
[functions]
  included_files = ["rules-context.json", "rules.json"]

# /api/chat çağrıları Netlify Function'a yönlendirilir (frontend kodu değişmiyor).
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback: bilinmeyen yolları index.html'e gönder.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
