name: Rules Sync

on:
  push:
    branches: [main]
    paths:
      - 'rules-docs/**.docx'
      - 'rule-agent.mjs'
      - 'rules-schema.json'
  workflow_dispatch:

# Aynı anda birden fazla rules-sync koşmasın (race condition önleme)
concurrency:
  group: rules-sync
  cancel-in-progress: false

jobs:
  sync-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run rule-agent (CI, once, all docs)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
          CI: 'true'
        run: node rule-agent.mjs --once --ci

      - name: Detect changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain rules.json rules-context.json)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            git --no-pager diff --stat rules.json rules-context.json
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "rules.json değişmedi."
          fi

      - name: Commit & push (with rebase)
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "denetrai-rules-bot"
          git config user.email "actions@users.noreply.github.com"
          git add rules.json rules-context.json
          git commit -m "chore(rules): auto-sync from rules-docs (CI)"
          # Origin ilerlemiş olabilir — rebase et
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
          echo "Push 3 deneme sonrası başarısız."
          exit 1
